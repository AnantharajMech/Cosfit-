function tdee(w,h,a,g,goal){
  const bmr=g==="f"?10*w+6.25*h-5*a-161:10*w+6.25*h-5*a+5;
  return Math.round(bmr*1.55)+((GOALS.find(x=>x.id===goal))||{calMod:0}).calMod;
}

function tdee(w,h,a,g,goal){
  const bmr=g==="f"?10*w+6.25*h-5*a-161:10*w+6.25*h-5*a+5;
  return Math.round(bmr*1.55)+((GOALS.find(x=>x.id===goal))||{calMod:0}).calMod;
}

          ].map(b=>h("button",{key:b.l,onClick:b.fn,style:{background:b.bg,border:`1px solid ${b.bd}`,color:b.col,padding:"14px 16px",borderRadius:16,fontWeight:700,fontSize:14,cursor:"pointer",...F,textAlign:"left",display:"flex",alignItems:"center",gap:12}},h("span",{style:{fontSize:20}},b.ic),h("span",null,b.l)))
        ),
        h("div",{style:{textAlign:"center",color:"#1b2d1f",fontSize:11,paddingBottom:8,lineHeight:1.8}},"Cosfit v1.0.0 · ",COMPANY.name)
      )
    ),

    // ══ ADMIN ══════════════════════════════════════════════════════
    tab==="admin"&&isAdmin&&h("div",{style:{paddingBottom:90,height:"100vh",overflowY:"auto"}},
      h("div",{style:{padding:"52px 22px 18px",background:"linear-gradient(135deg,#080f1c,#0c1610)"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
          h("div",null,h("div",{style:{color:C.blue,fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase"}},"⚙️ Admin Panel"),h("div",{style:{...N,color:C.w,fontSize:24,fontWeight:900,marginTop:4}},"Full Control Centre")),
          h("button",{onClick:()=>{setIsAdmin(false);setTab("profile");pop("Exited admin");},style:{background:"rgba(248,113,113,.15)",border:"1px solid rgba(248,113,113,.3)",color:C.r,padding:"8px 14px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:700,...N}},"Exit")
        )
      ),
      h("div",{style:{padding:"0 22px 16px"}},
        h("div",{style:{display:"flex",background:C.card,borderRadius:14,padding:4,gap:3}},
          [["orders","📦 Orders"],["foods","🍽 Foods"],["plans","⚡ Plans"],["stats","📊 Stats"]].map(([k,l])=>h("button",{key:k,onClick:()=>setAdminTab(k),style:{flex:1,padding:"10px 6px",borderRadius:10,border:"none",cursor:"pointer",background:adminTab===k?C.blue:"transparent",color:adminTab===k?"#fff":C.m,fontWeight:700,fontSize:11,...F,whiteSpace:"nowrap"}},l))
        )
      ),
      adminTab==="orders"&&h("div",{style:{padding:"0 22px"}},
        h("div",{style:{background:"rgba(96,165,250,.08)",border:"1px solid rgba(96,165,250,.2)",borderRadius:12,padding:"12px 14px",marginBottom:14,fontSize:12,color:C.blue,lineHeight:1.6}},'💡 Tap "Update →" to advance status. Customer gets instant notification!'),
        orders.length===0?h("div",{style:{textAlign:"center",padding:"40px 0"}},h("div",{style:{fontSize:52}},"📦"),h("div",{style:{color:C.m,fontWeight:700,marginTop:12,...N}},"No orders yet")):
        orders.map(order=>h("div",{key:order.id,style:{background:C.card,borderRadius:20,marginBottom:14,border:`1px solid ${order.statusIdx<4?"rgba(74,222,128,.3)":C.b}`,overflow:"hidden"}},
          h("div",{style:{background:"linear-gradient(135deg,#080f1c,#0c1610)",padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
            h("div",null,h("div",{style:{...N,color:C.w,fontWeight:800,fontSize:13}},`#${String(order.id).slice(-8)}`),h("div",{style:{fontSize:11,color:C.m,marginTop:2}},`${order.date} · ${order.time} · ₹${order.total}`)),
            h("div",{style:{background:order.statusIdx<4?"rgba(74,222,128,.15)":"rgba(74,222,128,.07)",border:`1px solid ${order.statusIdx<4?C.g:"rgba(74,222,128,.15)"}`,borderRadius:99,padding:"5px 12px",fontSize:11,fontWeight:700,color:C.g}},`${ORDER_STEPS[order.statusIdx].icon} ${ORDER_STEPS[order.statusIdx].label}`)
          ),
          h("div",{style:{display:"flex",gap:3,padding:"10px 16px 0"}},
            ORDER_STEPS.map((_,i)=>h("div",{key:i,style:{flex:1,height:4,borderRadius:99,background:i<=order.statusIdx?C.g:C.b,transition:"background .5s"}}))
          ),
          h("div",{style:{padding:"12px 16px"}},
            h("div",{style:{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}},order.items.map(i=>h("span",{key:i.id,style:{background:C.surf,color:C.m,padding:"3px 10px",borderRadius:99,fontSize:11}},`${i.emoji} ${i.name} ×${i.qty}`))),
            order.statusIdx<4?
              h("button",{onClick:()=>updateOrder(order.id),style:{width:"100%",background:C.gG,color:"#060c08",border:"none",padding:"14px",borderRadius:14,fontWeight:900,fontSize:14,cursor:"pointer",...N}},`Update → ${ORDER_STEPS[order.statusIdx+1].icon} ${ORDER_STEPS[order.statusIdx+1].label}`):
              h("div",{style:{background:"rgba(74,222,128,.07)",border:"1px solid rgba(74,222,128,.2)",borderRadius:13,padding:"12px",textAlign:"center",color:C.g,fontSize:13,fontWeight:700,...N}},"✅ Delivered Successfully!")
          )
        ))
      ),
      adminTab==="foods"&&h("div",{style:{padding:"0 22px"}},
        h("div",{style:{background:"rgba(96,165,250,.08)",border:"1px solid rgba(96,165,250,.2)",borderRadius:12,padding:"11px 14px",marginBottom:14,fontSize:12,color:C.blue}},"💡 👁/🙈 Show/Hide · 📦/🚫 Stock · 🗑 Delete"),
        GOALS.map(goal=>h("div",{key:goal.id,style:{marginBottom:24}},
          h("div",{style:{...N,color:C.w,fontWeight:900,fontSize:15,marginBottom:12,display:"flex",alignItems:"center",gap:8}},h("span",null,goal.icon),h("span",null,goal.label),h("span",{style:{color:C.m,fontSize:11,fontWeight:600,marginLeft:"auto"}},`${Object.values(foods[goal.id]||{}).flat().length} items`)),
          MEALS.map(meal=>h("div",{key:meal,style:{marginBottom:14}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
              h("div",{style:{fontSize:10,fontWeight:700,color:C.m,textTransform:"uppercase",letterSpacing:1.2}},`${MEAL_IC[meal]} ${meal} (${(foods[goal.id]?.[meal]||[]).length})`),
              h("button",{onClick:()=>{const name=prompt("Item Name:");const price=prompt("Price ₹:");const cal=prompt("Calories:");if(name&&price&&cal)addFood(goal.id,meal,{name,price:+price,cal:+cal,p:0,c:0,f:0,emoji:"🍱",tag:"New",time:"15m",desc:"Freshly prepared"});},style:{background:"rgba(74,222,128,.1)",border:"1px solid rgba(74,222,128,.25)",color:C.g,padding:"5px 14px",borderRadius:20,cursor:"pointer",fontWeight:700,fontSize:11,...F}},"+ Add")
            ),
            (foods[goal.id]?.[meal]||[]).length===0&&h("div",{style:{background:"rgba(255,255,255,.02)",border:`1px dashed ${C.b}`,borderRadius:12,padding:"14px",textAlign:"center",color:C.m,fontSize:12}},"No items · Tap + Add"),
            (foods[goal.id]?.[meal]||[]).map(item=>h("div",{key:item.id,style:{background:C.card,borderRadius:14,padding:"10px 12px",marginBottom:8,border:`1px solid ${!item.stock?"rgba(248,113,113,.25)":!item.active?"rgba(255,255,255,.04)":C.b}`,display:"flex",alignItems:"center",gap:9,opacity:!item.active?0.45:1}},
              h("span",{style:{fontSize:22,flexShrink:0}},item.emoji),
              h("div",{style:{flex:1,minWidth:0}},
                h("div",{style:{...N,fontWeight:700,color:C.w,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},item.name),
                h("div",{style:{fontSize:10,color:C.m}},`₹${item.price} · ${item.cal}kcal`)
              ),
              h("div",{style:{display:"flex",gap:4,flexShrink:0}},
                h("button",{onClick:()=>toggleProp(goal.id,meal,item.id,"stock"),style:{background:item.stock?"rgba(74,222,128,.12)":"rgba(248,113,113,.12)",border:"none",color:item.stock?C.g:C.r,width:30,height:30,borderRadius:8,cursor:"pointer",fontSize:13}},item.stock?"📦":"🚫"),
                h("button",{onClick:()=>toggleProp(goal.id,meal,item.id,"active"),style:{background:item.active?"rgba(74,222,128,.12)":"rgba(100,100,100,.1)",border:"none",color:item.active?C.g:C.m,width:30,height:30,borderRadius:8,cursor:"pointer",fontSize:14}},item.active?"👁":"🙈"),
                h("button",{onClick:()=>deleteFood(goal.id,meal,item.id,item.name),style:{background:"rgba(248,113,113,.12)",border:"none",color:C.r,width:30,height:30,borderRadius:8,cursor:"pointer",fontSize:13}},"🗑")
              )
            ))
          ))
        ))
      ),
      adminTab==="plans"&&h("div",{style:{padding:"0 22px"}},
        plans.map(plan=>h("div",{key:plan.id,style:{background:plan.hot?"rgba(74,222,128,.07)":C.card,border:`1.5px solid ${plan.hot?C.g:C.b}`,borderRadius:18,padding:"18px 20px",marginBottom:14,position:"relative"}},
          plan.hot&&h("div",{style:{position:"absolute",top:-10,right:16,background:C.gG,color:"#060c08",fontSize:9,fontWeight:900,padding:"3px 12px",borderRadius:99}},"POPULAR"),
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}},
            h("div",null,h("div",{style:{...N,color:C.w,fontWeight:900,fontSize:18}},plan.label),h("div",{style:{...N,color:C.o,fontWeight:900,fontSize:22,marginTop:4}},`₹${plan.price}`,h("span",{style:{color:C.m,fontSize:13,fontWeight:600}},`/${plan.per}`))),
            h("div",{style:{display:"flex",flexDirection:"column",gap:6}},
              h("button",{onClick:()=>{const p=prompt("New price:",plan.price);if(p)setPlans(x=>x.map(pl=>pl.id===plan.id?{...pl,price:+p}:pl));},style:{background:C.blue,color:"#fff",border:"none",padding:"8px 16px",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:12,...N}},"Edit ₹"),
              h("button",{onClick:()=>setPlans(x=>x.map(pl=>pl.id===plan.id?{...pl,hot:!pl.hot}:pl)),style:{background:plan.hot?"rgba(74,222,128,.12)":"rgba(255,255,255,.05)",border:"none",color:plan.hot?C.g:C.m,padding:"8px 16px",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:11,...F}},plan.hot?"★ Popular":"☆ Mark Popular")
            )
          ),
          plan.features.map((f,i)=>h("div",{key:i,style:{display:"flex",gap:8,alignItems:"center",marginBottom:6}},h("span",{style:{color:C.g,fontSize:12}},"✓"),h("span",{style:{color:C.m,fontSize:12}},f)))
        ))
      ),
      adminTab==="stats"&&h("div",{style:{padding:"0 22px"}},
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}},
          [["📦","Orders",orders.length,C.g],["💰","Revenue","₹"+orders.reduce((s,o)=>s+o.total,0),C.o],["🍽","Items",allFlat.length,C.blue],["✅","Active",allFlat.filter(i=>i.active&&i.stock).length,C.g],["🚫","Out of Stock",allFlat.filter(i=>!i.stock).length,C.r],["🔔","Notifs",notifs.length,C.gold]].map(([ic,l,v,col])=>
            h("div",{key:l,style:{background:C.card,borderRadius:18,padding:"16px",border:`1px solid ${C.b}`}},h("div",{style:{fontSize:22}},ic),h("div",{style:{...N,color:col,fontSize:24,fontWeight:900,marginTop:6}},v),h("div",{style:{color:C.m,fontSize:11,marginTop:3}},l))
          )
        ),
        h("div",{style:{background:C.card,borderRadius:18,padding:18,border:`1px solid ${C.b}`}},
          h("div",{style:{...N,color:C.w,fontWeight:800,marginBottom:14}},"Items by Goal"),
          GOALS.map(g=>{const cnt=Object.values(foods[g.id]||{}).flat().length;const tot=allFlat.length||1;return h("div",{key:g.id,style:{marginBottom:14}},
            h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:6}},h("span",{style:{color:C.m}},`${g.icon} ${g.label}`),h("span",{style:{color:C.w,fontWeight:700}},`${cnt} items`)),
            h("div",{style:{background:C.b,borderRadius:99,height:6,overflow:"hidden"}},h("div",{style:{background:C.gG,height:"100%",width:`${Math.round(cnt/tot*100)}%`,borderRadius:99}}))
          );})
        )
      )
    ),

    // ══ BOTTOM NAV ════════════════════════════════════════════════
    h("div",{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(6,12,8,.97)",backdropFilter:"blur(24px)",borderTop:`1px solid ${C.b}`,display:"flex",padding:"10px 0 24px",zIndex:200}},
      NavBtn("home","🏠","Home",0),
      NavBtn("menu","🍽","Menu",0),
      NavBtn("cart","🛒","Cart",cartCount),
      NavBtn("track","🛵","Track",liveCount),
      NavBtn("notifs","🔔","Alerts",unread)
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
